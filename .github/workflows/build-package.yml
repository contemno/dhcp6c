name: Build OPNsense package

# Two ways in:
#  - push to master: builds opnsense/dhcp6c from the pushed commit of THIS repo
#    (the port's GH_ACCOUNT/GH_TAGNAME are pointed at it), so every merge
#    produces an installable .pkg artifact.
#  - workflow_dispatch: builds ANY port from opnsense/ports, with optional
#    fork/commit overrides.
#
# The build runs inside a FreeBSD VM (QEMU) on a stock ubuntu-latest runner
# via vmactions/freebsd-vm, since OPNsense packages must be built on FreeBSD.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      port:
        description: "Port origin (category/name)"
        default: "opnsense/dhcp6c"
        required: true
      ports_branch:
        description: "opnsense/ports branch or tag (empty = PORTS_BRANCH repo variable)"
        default: ""
        required: false
      gh_account:
        description: "GH_ACCOUNT override (fork owner; empty = port default)"
        default: ""
        required: false
      gh_tagname:
        description: "GH_TAGNAME override (tag or commit; empty = port default)"
        default: ""
        required: false
      freebsd_release:
        description: "FreeBSD release for the build VM (match target OPNsense base)"
        default: "14.3"
        required: true

# Default opnsense/ports ref. opnsense/ports has no stable/* branches;
# releases are tags like 26.1.11 (plus master). Set the PORTS_BRANCH
# repository variable (Settings > Secrets and variables > Actions >
# Variables) to the tag matching your OPNsense release — master is only
# the fallback when the variable is unset.
env:
  PORTS_BRANCH: ${{ vars.PORTS_BRANCH || 'master' }}

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "port=opnsense/dhcp6c"                       >> "$GITHUB_OUTPUT"
            echo "ports_branch=$PORTS_BRANCH"                 >> "$GITHUB_OUTPUT"
            echo "gh_account=${{ github.repository_owner }}"  >> "$GITHUB_OUTPUT"
            echo "gh_tagname=${{ github.sha }}"               >> "$GITHUB_OUTPUT"
            echo "freebsd_release=14.3"                       >> "$GITHUB_OUTPUT"
          else
            echo "port=${{ inputs.port }}"                       >> "$GITHUB_OUTPUT"
            echo "ports_branch=${{ inputs.ports_branch || env.PORTS_BRANCH }}" >> "$GITHUB_OUTPUT"
            echo "gh_account=${{ inputs.gh_account }}"           >> "$GITHUB_OUTPUT"
            echo "gh_tagname=${{ inputs.gh_tagname }}"           >> "$GITHUB_OUTPUT"
            echo "freebsd_release=${{ inputs.freebsd_release }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ steps.params.outputs.freebsd_release }}
          usesh: true
          prepare: |
            pkg install -y git
          run: |
            set -e
            sh build/build-package.sh \
              -p "${{ steps.params.outputs.port }}" \
              -b "${{ steps.params.outputs.ports_branch }}" \
              -a "${{ steps.params.outputs.gh_account }}" \
              -t "${{ steps.params.outputs.gh_tagname }}" \
              -o ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: opnsense-package
          path: artifacts/*.pkg
          if-no-files-found: error
